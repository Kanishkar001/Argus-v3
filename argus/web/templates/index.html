<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Argus v{{ version }} — Recon Dashboard</title>
<style>
:root {
  --bg:       #0d1117;
  --bg2:      #161b22;
  --bg3:      #21262d;
  --border:   #30363d;
  --teal:     #2ec4b6;
  --teal-dim: #1a7a72;
  --text:     #c9d1d9;
  --text-dim: #8b949e;
  --red:      #f85149;
  --yellow:   #d29922;
  --green:    #3fb950;
  --blue:     #58a6ff;
  --purple:   #bc8cff;
  --font:     'Segoe UI', system-ui, sans-serif;
  --mono:     'Cascadia Code', 'Fira Code', monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;display:flex;flex-direction:column;min-height:100vh}

/* Layout */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px}
header h1{font-size:18px;font-weight:600;color:var(--teal);letter-spacing:.5px}
header .ver{font-size:11px;background:var(--bg3);border:1px solid var(--border);padding:2px 8px;border-radius:20px;color:var(--text-dim)}
.api-status{margin-left:auto;display:flex;gap:8px;align-items:center}
.api-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.api-ok{background:var(--green)}
.api-no{background:var(--red)}

main{display:grid;grid-template-columns:300px 1fr;gap:0;flex:1;overflow:hidden;height:calc(100vh - 49px)}

/* Sidebar */
aside{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-top{padding:12px;border-bottom:1px solid var(--border)}
.sidebar-top input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text);font-size:13px;outline:none}
.sidebar-top input:focus{border-color:var(--teal)}
.section-tabs{display:flex;gap:4px;padding:8px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.tab{font-size:11px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:.15s}
.tab.active,.tab:hover{background:var(--teal);color:#000;border-color:var(--teal)}
#module-list{flex:1;overflow-y:auto;padding:6px}
.mod-item{padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:2px;border:1px solid transparent;transition:.12s}
.mod-item:hover{background:var(--bg3);border-color:var(--border)}
.mod-item.selected{background:var(--teal-dim);border-color:var(--teal)}
.mod-num{font-size:11px;color:var(--text-dim);min-width:28px;display:inline-block}
.mod-name{font-size:13px}
.mod-desc{font-size:11px;color:var(--text-dim);margin-top:2px}

/* Main panel */
.panel{display:flex;flex-direction:column;overflow:hidden}

/* Target bar */
.target-bar{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;gap:8px;align-items:center}
.target-bar input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--text);font-size:13px;outline:none}
.target-bar input:focus{border-color:var(--teal)}
.target-bar select{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 8px;color:var(--text);font-size:13px;outline:none}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:.15s}
.btn-teal{background:var(--teal);color:#000}
.btn-teal:hover{background:#26a99d}
.btn-teal:disabled{background:var(--border);color:var(--text-dim);cursor:not-allowed}
.btn-ghost{background:var(--bg3);border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--text-dim)}

/* Selected modules chips */
.selected-bar{padding:8px 16px;border-bottom:1px solid var(--border);min-height:38px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.chip{font-size:11px;background:var(--teal-dim);color:var(--teal);border:1px solid var(--teal);padding:2px 8px;border-radius:20px;display:flex;align-items:center;gap:4px}
.chip .x{cursor:pointer;opacity:.7}
.chip .x:hover{opacity:1}
.none-label{color:var(--text-dim);font-size:12px}

/* Output */
.output-area{flex:1;overflow-y:auto;padding:12px 16px;background:var(--bg)}
.scan-module-header{color:var(--teal);font-family:var(--mono);font-size:12px;margin:8px 0 4px;opacity:.9}
.out-line{font-family:var(--mono);font-size:12px;line-height:1.5;white-space:pre-wrap;word-break:break-all}
.out-line.ok{color:var(--green)}
.out-line.warn{color:var(--yellow)}
.out-line.alert{color:var(--red)}
.out-line.info{color:var(--text)}
.out-line.dim{color:var(--text-dim)}
.status-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;margin-right:6px}
.badge-running{background:#1a3a5c;color:var(--blue)}
.badge-done{background:#1a3d2b;color:var(--green)}
.badge-error{background:#3d1a1a;color:var(--red)}

/* Scan history sidebar toggle */
.history-btn{position:fixed;bottom:16px;right:16px;background:var(--teal);color:#000;border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.history-panel{position:fixed;bottom:64px;right:16px;width:320px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;max-height:60vh;overflow-y:auto;display:none;z-index:100}
.history-panel.open{display:block}
.hist-item{padding:8px;border-radius:6px;border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:.12s}
.hist-item:hover{border-color:var(--teal)}
.hist-target{font-size:13px;font-weight:500}
.hist-meta{font-size:11px;color:var(--text-dim);margin-top:2px}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<header>
  <h1>⬛ ARGUS</h1>
  <span class="ver">v{{ version }}</span>
  <span style="color:var(--text-dim);font-size:12px">Recon Dashboard</span>
  <div class="api-status" id="api-status-bar"></div>
</header>

<main>
  <!-- Module sidebar -->
  <aside>
    <div class="sidebar-top">
      <input type="text" id="mod-search" placeholder="Search modules…" oninput="filterModules()"/>
    </div>
    <div class="section-tabs">
      <button class="tab active" onclick="setSection('',this)">All</button>
      <button class="tab" onclick="setSection('network',this)">Network</button>
      <button class="tab" onclick="setSection('web',this)">Web</button>
      <button class="tab" onclick="setSection('security',this)">Security</button>
    </div>
    <div id="module-list"></div>
  </aside>

  <!-- Main scan panel -->
  <div class="panel">
    <div class="target-bar">
      <input type="text" id="target-input" placeholder="Target domain or IP (e.g. example.com)"/>
      <select id="threads-select">
        <option value="1">1 thread</option>
        <option value="2">2 threads</option>
        <option value="4" selected>4 threads</option>
        <option value="8">8 threads</option>
        <option value="16">16 threads</option>
      </select>
      <button class="btn btn-ghost" onclick="clearSelected()">Clear</button>
      <button class="btn btn-teal" id="run-btn" onclick="startScan()" disabled>▶ Run</button>
    </div>

    <div class="selected-bar" id="selected-bar">
      <span class="none-label" id="none-label">No modules selected — click modules to add them</span>
    </div>

    <div class="output-area" id="output-area">
      <div style="color:var(--text-dim);font-size:13px;text-align:center;margin-top:60px">
        Select modules → enter a target → click Run
      </div>
    </div>
  </div>
</main>

<!-- Scan history -->
<button class="history-btn" onclick="toggleHistory()" title="Scan history">☰</button>
<div class="history-panel" id="history-panel">
  <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--teal)">Scan History</div>
  <div id="history-list"><span style="color:var(--text-dim);font-size:12px">No scans yet.</span></div>
</div>

<script>
const state = { section: '', selectedMods: new Map(), scanning: false };

// ── API ──────────────────────────────────────────────────────────────────
async function fetchModules(q='', section='') {
  const p = new URLSearchParams();
  if (q) p.set('q', q);
  if (section) p.set('section', section);
  const r = await fetch('/api/modules?' + p);
  return (await r.json()).modules;
}

async function fetchApiStatus() {
  const r = await fetch('/api/api_status');
  return r.json();
}

async function fetchScans() {
  const r = await fetch('/api/scans');
  return (await r.json()).scans;
}

// ── Render modules ────────────────────────────────────────────────────────
async function renderModules() {
  const q = document.getElementById('mod-search').value;
  const mods = await fetchModules(q, state.section);
  const list = document.getElementById('module-list');
  list.innerHTML = '';

  if (!mods.length) {
    list.innerHTML = '<div style="color:var(--text-dim);font-size:12px;padding:12px">No modules found.</div>';
    return;
  }

  mods.forEach(m => {
    const div = document.createElement('div');
    div.className = 'mod-item' + (state.selectedMods.has(m.number) ? ' selected' : '');
    div.dataset.num = m.number;
    div.innerHTML = `
      <div><span class="mod-num">${m.number}</span><span class="mod-name">${m.name}</span></div>
      ${m.description ? `<div class="mod-desc">${m.description}</div>` : ''}
    `;
    div.onclick = () => toggleModule(m);
    list.appendChild(div);
  });
}

function toggleModule(m) {
  if (state.selectedMods.has(m.number)) {
    state.selectedMods.delete(m.number);
  } else {
    state.selectedMods.set(m.number, m);
  }
  renderChips();
  renderModules();
}

function clearSelected() {
  state.selectedMods.clear();
  renderChips();
  renderModules();
}

function renderChips() {
  const bar = document.getElementById('selected-bar');
  const label = document.getElementById('none-label');
  const runBtn = document.getElementById('run-btn');

  bar.querySelectorAll('.chip').forEach(c => c.remove());

  if (state.selectedMods.size === 0) {
    label.style.display = '';
    runBtn.disabled = true;
    return;
  }
  label.style.display = 'none';
  runBtn.disabled = state.scanning;

  state.selectedMods.forEach((m, num) => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.innerHTML = `${m.name} <span class="x" onclick="removeChip('${num}')">✕</span>`;
    bar.appendChild(chip);
  });
}

function removeChip(num) {
  state.selectedMods.delete(num);
  renderChips();
  renderModules();
}

function setSection(sec, btn) {
  state.section = sec;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderModules();
}

function filterModules() { renderModules(); }

// ── Scan ──────────────────────────────────────────────────────────────────
function colorLine(text) {
  const t = text.toLowerCase();
  if (/critical|exploit|compromis|severe|takeover/.test(t)) return 'alert';
  if (/warn|risk|exposed|vulnerable|expired|high/.test(t)) return 'warn';
  if (/\[.*ok.*\]|secure|valid|\[green\]|\[\+\]/.test(t) || text.includes('✓')) return 'ok';
  if (/^\s*(=+|-+|[─━]+)\s*$/.test(text)) return 'dim';
  return 'info';
}

function appendLine(text, cls) {
  const area = document.getElementById('output-area');
  // Strip rich markup tags for cleaner display
  const clean = text.replace(/\[\/?\w[\w\s#]*?\]/g, '');
  const div = document.createElement('div');
  div.className = 'out-line ' + (cls || colorLine(clean));
  div.textContent = clean;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function appendModuleHeader(name, badge, badgeCls) {
  const area = document.getElementById('output-area');
  const div = document.createElement('div');
  div.className = 'scan-module-header';
  div.innerHTML = `<span class="status-badge ${badgeCls}">${badge}</span>${name}`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

async function startScan() {
  const target = document.getElementById('target-input').value.trim();
  if (!target) { alert('Enter a target domain or IP.'); return; }
  if (state.selectedMods.size === 0) { alert('Select at least one module.'); return; }

  state.scanning = true;
  document.getElementById('run-btn').disabled = true;
  document.getElementById('output-area').innerHTML = '';

  appendLine(`▶ Scan started — target: ${target}`, 'ok');
  appendLine(`  Modules: ${state.selectedMods.size}  |  Threads: ${document.getElementById('threads-select').value}`, 'dim');
  appendLine('', 'dim');

  const body = {
    target,
    modules:  [...state.selectedMods.keys()],
    threads:  parseInt(document.getElementById('threads-select').value),
  };

  const res  = await fetch('/api/scan/start', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const data = await res.json();
  if (data.error) { appendLine('[!] ' + data.error, 'alert'); state.scanning = false; return; }

  const evtSrc = new EventSource(`/api/scan/${data.scan_id}/stream`);

  evtSrc.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'ping') return;
    if (msg.type === 'start')    { appendModuleHeader(msg.module, 'RUNNING', 'badge-running'); return; }
    if (msg.type === 'output')   { appendLine(msg.text); return; }
    if (msg.type === 'error')    { appendLine('[!] ' + msg.text, 'alert'); return; }
    if (msg.type === 'done')     {
      appendLine(`✓  ${msg.module} — ${msg.lines} lines`, 'ok');
      appendLine('', 'dim');
    }
    if (msg.type === 'scan_done') {
      appendLine('', 'dim');
      appendLine('═══════════════════════════════', 'dim');
      appendLine('Scan complete.', 'ok');
      state.scanning = false;
      document.getElementById('run-btn').disabled = false;
      evtSrc.close();
      refreshHistory();
    }
  };

  evtSrc.onerror = () => {
    appendLine('[!] Stream disconnected.', 'warn');
    state.scanning = false;
    document.getElementById('run-btn').disabled = false;
    evtSrc.close();
  };
}

// ── History ───────────────────────────────────────────────────────────────
async function refreshHistory() {
  const scans = await fetchScans();
  const list  = document.getElementById('history-list');
  if (!scans.length) { list.innerHTML = '<span style="color:var(--text-dim);font-size:12px">No scans yet.</span>'; return; }
  list.innerHTML = scans.slice(0, 20).map(s => `
    <div class="hist-item" onclick="loadScanResult('${s.id}')">
      <div class="hist-target">${s.target}</div>
      <div class="hist-meta">
        ${s.modules.length} module(s) &nbsp;·&nbsp;
        <span style="color:${s.status==='running'?'var(--blue)':'var(--green)'}">${s.status}</span>
        &nbsp;·&nbsp; ${s.started.slice(0,16).replace('T',' ')}
      </div>
    </div>
  `).join('');
}

async function loadScanResult(scanId) {
  const res  = await fetch(`/api/results/${scanId}`);
  const data = await res.json();
  const area = document.getElementById('output-area');
  area.innerHTML = '';
  appendLine(`Results for: ${data.target}`, 'ok');
  appendLine('', 'dim');
  for (const [name, text] of Object.entries(data.outputs)) {
    appendModuleHeader(name, 'DONE', 'badge-done');
    text.split('\n').forEach(l => appendLine(l));
    appendLine('', 'dim');
  }
  document.getElementById('history-panel').classList.remove('open');
}

function toggleHistory() {
  const p = document.getElementById('history-panel');
  p.classList.toggle('open');
  if (p.classList.contains('open')) refreshHistory();
}

// ── API status bar ────────────────────────────────────────────────────────
async function renderApiStatus() {
  const status = await fetchApiStatus();
  const bar = document.getElementById('api-status-bar');
  const names = { VIRUSTOTAL_API_KEY:'VT', SHODAN_API_KEY:'Shodan', CENSYS_API_ID:'Censys', GOOGLE_API_KEY:'Google', HIBP_API_KEY:'HIBP' };
  bar.innerHTML = Object.entries(names).map(([k,label]) =>
    `<span title="${k}: ${status[k]?'configured':'not set'}">
       <span class="api-dot ${status[k]?'api-ok':'api-no'}"></span>
       <span style="font-size:11px;color:var(--text-dim)">${label}</span>
     </span>`
  ).join('');
}

// ── Init ──────────────────────────────────────────────────────────────────
renderModules();
renderApiStatus();
</script>
</body>
</html>
